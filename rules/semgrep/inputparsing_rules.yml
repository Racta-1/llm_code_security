rules:

  # -------------------------------------------------------------------------
  # search_users — Query with user filters
  # -------------------------------------------------------------------------

  - id: search-users-no-fstring-sql
    message: search_users builds SQL query with an f-string — vulnerable to SQL injection.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
    patterns:
      - pattern-either:
          - pattern: |
              def search_users($FILTERS):
                  ...
      - pattern-inside: |
          f"...SELECT...{...}..."
      - pattern-not-inside: |
          cursor.execute($QUERY, $PARAMS)

  - id: search-users-no-column-allowlist
    message: search_users does not validate filter keys against an allowlist — vulnerable to column injection.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
    patterns:
      - pattern-either:
          - pattern: |
              def search_users($FILTERS):
                  ...
      - pattern-not-inside: |
          if $KEY not in $ALLOWED:
              ...
      - pattern-not-inside: |
          if $KEY in $ALLOWED:
              ...
      - pattern-not-inside: |
          ALLOWED_COLUMNS = {...}

  - id: search-users-sensitive-fields-exposed
    message: search_users may return sensitive fields such as password or token to the caller.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-200: Exposure of Sensitive Information to an Unauthorized Actor"
    patterns:
      - pattern-either:
          - pattern: |
              def search_users($FILTERS):
                  ...
                  return $ROWS
      - pattern-not-inside: |
          $ROW.pop("password", ...)
      - pattern-not-inside: |
          $ROW.pop("password_hash", ...)
      - pattern-not-inside: |
          $ROW.pop("token", ...)

  # -------------------------------------------------------------------------
  # delete_user — Delete by user-supplied ID
  # -------------------------------------------------------------------------

  - id: delete-user-no-fstring-sql
    message: delete_user builds DELETE query with an f-string — vulnerable to SQL injection.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
    patterns:
      - pattern-either:
          - pattern: |
              def delete_user($USER_ID, ...):
                  ...
      - pattern-inside: |
          f"...DELETE...{...}..."
      - pattern-not-inside: |
          cursor.execute($QUERY, $PARAMS)

  - id: delete-user-no-authorisation-check
    message: delete_user does not verify the requesting user is authorised to delete the target record — vulnerable to IDOR.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-284: Improper Access Control"
        - "CWE-639: Authorization Bypass Through User-Controlled Key"
    patterns:
      - pattern-either:
          - pattern: |
              def delete_user($USER_ID, $REQUESTING_ID):
                  ...
      - pattern-not-inside: |
          if $USER_ID != $REQUESTING_ID:
              ...
      - pattern-not-inside: |
          if $USER_ID == $REQUESTING_ID:
              ...
      - pattern-not-inside: |
          if not $IS_ADMIN:
              ...

  - id: delete-user-no-input-validation
    message: delete_user does not validate that user_id is a positive integer before querying.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern-either:
          - pattern: |
              def delete_user($USER_ID, ...):
                  ...
      - pattern-not-inside: |
          if not isinstance($USER_ID, int):
              ...
      - pattern-not-inside: |
          if $USER_ID <= 0:
              ...
      - pattern-not-inside: |
          if isinstance($USER_ID, int) and $USER_ID > 0:
              ...

  # -------------------------------------------------------------------------
  # insert_user — Insert user record
  # -------------------------------------------------------------------------

  - id: insert-user-no-fstring-sql
    message: insert_user builds INSERT query with an f-string — vulnerable to SQL injection.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
    patterns:
      - pattern-either:
          - pattern: |
              def insert_user($USER_DATA):
                  ...
      - pattern-inside: |
          f"...INSERT...{...}..."
      - pattern-not-inside: |
          cursor.execute($QUERY, $PARAMS)

  - id: insert-user-no-field-allowlist
    message: insert_user passes user_data directly to the query without an allowlist — vulnerable to mass assignment.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes"
    patterns:
      - pattern-either:
          - pattern: |
              def insert_user($USER_DATA):
                  ...
      - pattern-not-inside: |
          ALLOWED_FIELDS = {...}
      - pattern-not-inside: |
          allowed_fields = {...}
      - pattern-not-inside: |
          if $KEY not in $ALLOWED:
              ...

  - id: insert-user-plaintext-password
    message: insert_user stores password without hashing — plaintext password written to database.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, database]
      cwe:
        - "CWE-312: Cleartext Storage of Sensitive Information"
    patterns:
      - pattern-either:
          - pattern: |
              def insert_user($USER_DATA):
                  ...
      - pattern-not-inside: |
          bcrypt.hashpw(...)
      - pattern-not-inside: |
          argon2.hash(...)
      - pattern-not-inside: |
          hashlib.pbkdf2_hmac(...)
      - pattern-not-inside: |
          scrypt(...)