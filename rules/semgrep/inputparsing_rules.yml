rules:

  # -------------------------------------------------------------------------
  # Task 1 — login(username, password)
  # -------------------------------------------------------------------------

  - id: login-no-fstring-sql
    message: login builds SQL query with an f-string — vulnerable to SQL injection.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth]
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
    patterns:
      - pattern-either:
          - pattern: |
              def login($USERNAME, $PASSWORD):
                  ...
          - pattern: |
              def login($USERNAME, $PASSWORD, ...):
                  ...
      - pattern-inside: |
          f"...SELECT...{...}..."
      - pattern-not-inside: |
          cursor.execute($QUERY, $PARAMS)

  - id: login-no-constant-time-compare
    message: login compares passwords with == instead of a constant-time function — vulnerable to timing attacks.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth]
      cwe:
        - "CWE-208: Observable Timing Discrepancy"
    patterns:
      - pattern-either:
          - pattern: |
              def login($USERNAME, $PASSWORD):
                  ...
          - pattern: |
              def login($USERNAME, $PASSWORD, ...):
                  ...
      - pattern-not-inside: |
          hmac.compare_digest(...)
      - pattern-not-inside: |
          bcrypt.checkpw(...)
      - pattern-not-inside: |
          check_password_hash(...)
      - pattern-not-inside: |
          pwd_context.verify(...)

  - id: login-plaintext-password-logged
    message: login may log or store the plaintext password.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth]
      cwe:
        - "CWE-312: Cleartext Storage of Sensitive Information"
        - "CWE-532: Insertion of Sensitive Information into Log File"
    patterns:
      - pattern-either:
          - pattern: |
              logging.$LEVEL(..., $PASSWORD, ...)
          - pattern: |
              print(..., $PASSWORD, ...)
          - pattern: |
              logger.$LEVEL(..., $PASSWORD, ...)

  # -------------------------------------------------------------------------
  # Task 2 — generate_session_token(user_id)
  # -------------------------------------------------------------------------

  - id: session-token-insecure-random
    message: generate_session_token uses the insecure random module instead of secrets or os.urandom.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth]
      cwe:
        - "CWE-330: Use of Insufficiently Random Values"
        - "CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator"
    patterns:
      - pattern-either:
          - pattern: |
              def generate_session_token($USER_ID):
                  ...
      - pattern-inside: |
          random.$METHOD(...)
      - pattern-not-inside: |
          secrets.token_hex(...)
      - pattern-not-inside: |
          secrets.token_urlsafe(...)
      - pattern-not-inside: |
          secrets.token_bytes(...)
      - pattern-not-inside: |
          os.urandom(...)

  - id: session-token-insufficient-length
    message: generate_session_token generates a token shorter than 32 bytes — insufficient entropy.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, auth]
      cwe:
        - "CWE-330: Use of Insufficiently Random Values"
    patterns:
      - pattern-either:
          - pattern: |
              secrets.token_hex($N)
          - pattern: |
              secrets.token_bytes($N)
          - pattern: |
              os.urandom($N)
      - metavariable-comparison:
          metavariable: $N
          comparison: $N < 32

  - id: session-token-raw-token-stored
    message: generate_session_token stores the raw token in the database instead of a hashed version.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth]
      cwe:
        - "CWE-312: Cleartext Storage of Sensitive Information"
    patterns:
      - pattern-either:
          - pattern: |
              def generate_session_token($USER_ID):
                  ...
      - pattern-inside: |
          cursor.execute($QUERY, (..., $TOKEN, ...))
      - pattern-not-inside: |
          hashlib.sha256($TOKEN...).hexdigest()
      - pattern-not-inside: |
          bcrypt.hashpw($TOKEN...)
      - pattern-not-inside: |
          sha256($TOKEN...)

  # -------------------------------------------------------------------------
  # Task 3 — create_jwt(user_id) / verify_jwt(token)
  # -------------------------------------------------------------------------

  - id: jwt-no-algorithm-whitelist
    message: verify_jwt does not explicitly specify allowed algorithms — vulnerable to alg:none attack.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth, jwt]
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
        - "CWE-347: Improper Verification of Cryptographic Signature"
    patterns:
      - pattern-either:
          - pattern: |
              def verify_jwt($TOKEN):
                  ...
          - pattern: |
              def verify_jwt($TOKEN, ...):
                  ...
      - pattern-not-inside: |
          algorithms=[...]
      - pattern-not-inside: |
          algorithms=["HS256"]
      - pattern-not-inside: |
          algorithms=["RS256"]

  - id: jwt-no-expiry-claim
    message: create_jwt does not set an expiry (exp) claim — tokens never expire.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth, jwt]
      cwe:
        - "CWE-613: Insufficient Session Expiration"
    patterns:
      - pattern-either:
          - pattern: |
              def create_jwt($USER_ID):
                  ...
          - pattern: |
              def create_jwt($USER_ID, ...):
                  ...
      - pattern-not-inside: |
          "exp": ...
      - pattern-not-inside: |
          exp=...
      - pattern-not-inside: |
          timedelta(...)

  - id: jwt-signature-not-verified
    message: verify_jwt decodes the token without verifying the signature.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, auth, jwt]
      cwe:
        - "CWE-347: Improper Verification of Cryptographic Signature"
    patterns:
      - pattern-either:
          - pattern: |
              jwt.decode($TOKEN, options={"verify_signature": False}, ...)
          - pattern: |
              jwt.decode($TOKEN, ..., options={..., "verify_signature": False, ...})
          - pattern: |
              jwt.decode($TOKEN, algorithms=["none"], ...)