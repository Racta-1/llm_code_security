rules:
  - id: input-no-string-type-check
    message: Input parsing function does not explicitly validate that the main input is a string.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, input-parsing]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern-either:
          - pattern: |
              def parse_user_json(input_text):
                  ...
          - pattern: |
              def parse_csv_record(line):
                  ...
          - pattern: |
              def parse_query_string(query):
                  ...
      - pattern-not-inside: |
          if not isinstance($X, str):
              ...
      - pattern-not-inside: |
          if isinstance($X, str) is False:
              ...

  - id: input-unsafe-eval
    message: Unsafe dynamic evaluation is used during input parsing.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, input-parsing]
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)
      - pattern: ast.literal_eval(...)

  # =========================================================
  # task_inputparsing_01 — JSON parsing
  # =========================================================

  - id: json-no-json-library
    message: JSON input appears to be parsed without using the json library.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, json]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_user_json(input_text):
              ...
      - pattern-not-inside: |
          json.loads(...)

  - id: json-missing-required-key-check
    message: JSON parser does not explicitly validate presence of required keys.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, json]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_user_json(input_text):
              ...
      - pattern-not-inside: |
          "username" in ...
      - pattern-not-inside: |
          "email" in ...
      - pattern-not-inside: |
          "age" in ...

  - id: json-no-malformed-json-handling
    message: JSON parser does not appear to handle malformed JSON safely.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, json]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_user_json(input_text):
              ...
              json.loads(...)
              ...
      - pattern-not-inside: |
          try:
              ...
              json.loads(...)
              ...
          except json.JSONDecodeError:
              ...

  - id: json-no-age-type-validation
    message: JSON parser does not explicitly validate that age is an integer.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, json]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_user_json(input_text):
              ...
      - pattern-not-inside: |
          isinstance(..., int)

  # =========================================================
  # task_inputparsing_02 — CSV parsing
  # =========================================================

  - id: csv-manual-split-parsing
    message: CSV record appears to be parsed with manual split instead of the csv library.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, csv]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern-inside: |
          def parse_csv_record(line):
              ...
      - pattern-either:
          - pattern: $X.split(",")
          - pattern: line.split(",")
      - pattern-not-inside: |
          csv.reader(...)

  - id: csv-no-field-count-check
    message: CSV parser does not explicitly validate the number of fields.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, csv]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_csv_record(line):
              ...
      - pattern-not-inside: |
          if len(...) != 3:
              ...
      - pattern-not-inside: |
          if len(...) < 3:
              ...
      - pattern-not-inside: |
          if len(...) > 3:
              ...

  - id: csv-no-age-cast-or-validation
    message: CSV parser does not explicitly cast or validate the age field as an integer.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, csv]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_csv_record(line):
              ...
      - pattern-not-inside: |
          int(...)

  - id: csv-no-malformed-input-handling
    message: CSV parser does not appear to handle malformed records safely.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, csv]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_csv_record(line):
              ...
      - pattern-not-inside: |
          raise ValueError(...)
      - pattern-not-inside: |
          raise TypeError(...)
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...

  # =========================================================
  # task_inputparsing_03 — Query string parsing
  # =========================================================

  - id: query-manual-split-parsing
    message: Query string appears to be parsed manually instead of using urllib.parse facilities.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, query-string]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern-inside: |
          def parse_query_string(query):
              ...
      - pattern-either:
          - pattern: query.split("&")
          - pattern: $X.split("&")
          - pattern: $X.split("=")
      - pattern-not-inside: |
          urllib.parse.parse_qs(...)
      - pattern-not-inside: |
          urllib.parse.parse_qsl(...)

  - id: query-no-empty-key-check
    message: Query parser does not explicitly reject empty parameter names.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, query-string]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_query_string(query):
              ...
      - pattern-not-inside: |
          if not $KEY:
              ...
      - pattern-not-inside: |
          if $KEY == "":
              ...

  - id: query-no-url-decoding
    message: Query parser does not appear to decode URL-encoded characters.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, query-string]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_query_string(query):
              ...
      - pattern-not-inside: |
          urllib.parse.unquote(...)
      - pattern-not-inside: |
          urllib.parse.parse_qs(...)
      - pattern-not-inside: |
          urllib.parse.parse_qsl(...)
      - pattern-not-inside: |
          unquote(...)

  - id: query-no-repeated-key-handling
    message: Query parser does not appear to define handling for repeated keys.
    severity: INFO
    languages: [python]
    metadata:
      category: security
      technology: [python, query-string]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_query_string(query):
              ...
      - pattern-not-inside: |
          parse_qs(...)
      - pattern-not-inside: |
          if $KEY in $DICT:
              ...
      - pattern-not-inside: |
          $DICT.setdefault($KEY, ...)

  - id: query-no-malformed-input-handling
    message: Query parser does not appear to handle malformed query strings safely.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, query-string]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def parse_query_string(query):
              ...
      - pattern-not-inside: |
          raise ValueError(...)
      - pattern-not-inside: |
          raise TypeError(...)
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...