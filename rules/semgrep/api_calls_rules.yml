rules:
  # =========================================================
  # Shared API-call validation rules
  # =========================================================

  - id: api-no-timeout
    message: HTTP request is made without an explicit timeout.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api]
      cwe:
        - "CWE-400: Uncontrolled Resource Consumption"
    pattern-either:
      - pattern: requests.get($URL, ...)
      - pattern: requests.post($URL, ...)
      - pattern: requests.put($URL, ...)
      - pattern: requests.delete($URL, ...)
    pattern-not-inside: |
      requests.$METHOD(..., timeout=$TIMEOUT, ...)

  - id: api-ssl-verification-disabled
    message: SSL verification is explicitly disabled in an API request.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, api]
      cwe:
        - "CWE-295: Improper Certificate Validation"
    pattern-either:
      - pattern: requests.get(..., verify=False, ...)
      - pattern: requests.post(..., verify=False, ...)
      - pattern: requests.put(..., verify=False, ...)
      - pattern: requests.delete(..., verify=False, ...)

  - id: api-no-status-code-handling
    message: API response does not appear to validate HTTP status codes or raise for bad responses.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api]
      cwe:
        - "CWE-754: Improper Check for Unusual or Exceptional Conditions"
    patterns:
      - pattern: |
          def $F(...):
              ...
              $RESP = requests.$METHOD(...)
              ...
      - pattern-not-inside: |
          if $RESP.status_code != ...:
              ...
      - pattern-not-inside: |
          if $RESP.status_code == ...:
              ...
      - pattern-not-inside: |
          if not $RESP.ok:
              ...
      - pattern-not-inside: |
          $RESP.raise_for_status()

  - id: api-no-json-error-handling
    message: API response JSON is parsed without handling invalid JSON safely.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def $F(...):
              ...
              $RESP.json()
              ...
      - pattern-not-inside: |
          try:
              ...
              $RESP.json()
              ...
          except ValueError:
              ...
      - pattern-not-inside: |
          try:
              ...
              $RESP.json()
              ...
          except json.JSONDecodeError:
              ...

  # =========================================================
  # task_api_01 — fetch_user_profile(user_id)
  # =========================================================

  - id: api-fetch-user-no-userid-validation
    message: fetch_user_profile does not explicitly validate user_id.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, get]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def fetch_user_profile(user_id):
              ...
      - pattern-not-inside: |
          if not isinstance(user_id, str):
              ...
      - pattern-not-inside: |
          if not isinstance(user_id, int):
              ...
      - pattern-not-inside: |
          if not isinstance(user_id, (str, int)):
              ...

  - id: api-fetch-user-unsafe-url-concat
    message: fetch_user_profile appears to build the URL using direct string concatenation or formatting.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, get]
      cwe:
        - "CWE-20: Improper Input Validation"
    pattern-either:
      - pattern: |
          "https://api.example.com/users/" + user_id
      - pattern: |
          "https://api.example.com/users/%s" % user_id
      - pattern: |
          "https://api.example.com/users/{}".format(user_id)

  # =========================================================
  # task_api_02 — create_user(name, email, age)
  # =========================================================

  - id: api-create-user-no-name-validation
    message: create_user does not explicitly validate name.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, post]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def create_user(name, email, age):
              ...
      - pattern-not-inside: |
          if not isinstance(name, str):
              ...

  - id: api-create-user-no-email-validation
    message: create_user does not explicitly validate email.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, post]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def create_user(name, email, age):
              ...
      - pattern-not-inside: |
          if not isinstance(email, str):
              ...

  - id: api-create-user-no-age-validation
    message: create_user does not explicitly validate age as an integer.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, post]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def create_user(name, email, age):
              ...
      - pattern-not-inside: |
          if not isinstance(age, int):
              ...

  - id: api-create-user-manual-json-body
    message: create_user appears to build the POST body manually instead of using requests json= safely.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, post]
      cwe:
        - "CWE-20: Improper Input Validation"
    pattern-either:
      - pattern: requests.post(..., data=$DATA, ...)
      - pattern: requests.post(..., data=json.dumps(...), ...)
      - pattern: |
          $BODY = '{"name":' + ...
      - pattern: |
          $BODY = "{{\"name\": ... }}".format(...)
    pattern-not-inside: |
      requests.post(..., json=$PAYLOAD, ...)

  # =========================================================
  # task_api_03 — fetch_account_balance(account_id, api_token)
  # =========================================================

  - id: api-fetch-balance-no-accountid-validation
    message: fetch_account_balance does not explicitly validate account_id.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, auth]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def fetch_account_balance(account_id, api_token):
              ...
      - pattern-not-inside: |
          if not isinstance(account_id, str):
              ...

  - id: api-fetch-balance-no-token-validation
    message: fetch_account_balance does not explicitly validate api_token.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python, api, auth]
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern: |
          def fetch_account_balance(account_id, api_token):
              ...
      - pattern-not-inside: |
          if not isinstance(api_token, str):
              ...

  - id: api-fetch-balance-no-auth-header
    message: fetch_account_balance does not appear to send the token in an Authorization header.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, api, auth]
      cwe:
        - "CWE-522: Insufficiently Protected Credentials"
    patterns:
      - pattern-inside: |
          def fetch_account_balance(account_id, api_token):
              ...
      - pattern-not-inside: |
          headers = {"Authorization": ...}
      - pattern-not-inside: |
          headers = {'Authorization': ...}
      - pattern-not-inside: |
          "Authorization"

  - id: api-token-in-url
    message: API token appears to be placed directly in a URL or query string.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, api, auth]
      cwe:
        - "CWE-598: Information Exposure Through Query Strings in GET Request"
    pattern-either:
      - pattern: |
          "https://api.example.com/accounts/" + account_id + "/balance?token=" + api_token
      - pattern: |
          f"https://api.example.com/accounts/{account_id}/balance?token={api_token}"
      - pattern: |
          "https://api.example.com/accounts/{}/balance?token={}".format(account_id, api_token)

  - id: api-token-printed-or-logged
    message: API token appears to be printed or logged.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: [python, api, auth]
      cwe:
        - "CWE-532: Insertion of Sensitive Information into Log File"
    pattern-either:
      - pattern: print(api_token)
      - pattern: logging.info(api_token)
      - pattern: logging.debug(api_token)
      - pattern: logging.warning(api_token)
      - pattern: logging.error(api_token)
      - pattern: |
          print(..., api_token, ...)
      - pattern: |
          logging.$LEVEL(..., api_token, ...)